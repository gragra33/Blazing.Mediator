name: Release

on:
    push:
        branches:
            - master

jobs:
    release:
        name: Build, Test & Publish to NuGet
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: |
                      9.0.x
                      10.0.x
            - name: Restore
              run: dotnet restore Blazing.Mediator.CI.slnf
            - name: Build
              run: dotnet build Blazing.Mediator.CI.slnf --no-restore --configuration Release -p:GeneratePackageOnBuild=false
            - name: Test (net9.0)
              run: |
                  dotnet test tests/Blazing.Mediator.Tests/Blazing.Mediator.Tests.csproj --no-build --configuration Release --framework net9.0
                  dotnet test tests/ECommerce.Api.Tests/ECommerce.Api.Tests.csproj --no-build --configuration Release --framework net9.0
                  dotnet test tests/UserManagement.Api.Tests/UserManagement.Api.Tests.csproj --no-build --configuration Release --framework net9.0
                  dotnet test tests/Streaming.Api.Tests/Streaming.Api.Tests.csproj --no-build --configuration Release --framework net9.0
                  dotnet test tests/OpenTelemetryExample.Tests/OpenTelemetryExample.Tests.csproj --no-build --configuration Release --framework net9.0
            - name: Test (net10.0)
              run: |
                  dotnet test tests/Blazing.Mediator.Tests/Blazing.Mediator.Tests.csproj --no-build --configuration Release --framework net10.0
                  dotnet test tests/ECommerce.Api.Tests/ECommerce.Api.Tests.csproj --no-build --configuration Release --framework net10.0
                  dotnet test tests/UserManagement.Api.Tests/UserManagement.Api.Tests.csproj --no-build --configuration Release --framework net10.0
                  dotnet test tests/Streaming.Api.Tests/Streaming.Api.Tests.csproj --no-build --configuration Release --framework net10.0
                  dotnet test tests/OpenTelemetryExample.Tests/OpenTelemetryExample.Tests.csproj --no-build --configuration Release --framework net10.0
            - name: Extract version from Directory.Build.props
              id: version
              run: |
                  VERSION=$(grep -m1 '<Version>' Directory.Build.props \
                    | sed 's/.*<Version>//;s/<\/Version>.*//' \
                    | tr -d '[:space:]')
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tag=v$VERSION" >> $GITHUB_OUTPUT
                  echo "Resolved version: $VERSION"
            - name: Check if this version was already released
              id: tag_check
              run: |
                  if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi
            - name: Pack NuGet packages
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  dotnet pack src/Blazing.Mediator/Blazing.Mediator.csproj \
                    --no-build --configuration Release --output ./artifacts
                  dotnet pack src/Blazing.Mediator.SourceGenerators/Blazing.Mediator.SourceGenerators.csproj \
                    --no-build --configuration Release --output ./artifacts
            - name: Create GitHub Release
              if: steps.tag_check.outputs.exists == 'false'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ steps.version.outputs.tag }}" \
                    --title "Release ${{ steps.version.outputs.tag }}" \
                    --generate-notes \
                    ./artifacts/*.nupkg \
                    ./artifacts/*.snupkg
            - name: Push Blazing.Mediator to NuGet.org
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  dotnet nuget push \
                    "./artifacts/Blazing.Mediator.${{ steps.version.outputs.version }}.nupkg" \
                    --api-key ${{ secrets.NUGET_API_KEY }} \
                    --source https://api.nuget.org/v3/index.json --skip-duplicate
            - name: Push Blazing.Mediator symbols to NuGet.org
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  dotnet nuget push \
                    "./artifacts/Blazing.Mediator.${{ steps.version.outputs.version }}.snupkg" \
                    --api-key ${{ secrets.NUGET_API_KEY }} \
                    --source https://api.nuget.org/v3/index.json --skip-duplicate
            - name: Push Blazing.Mediator.SourceGenerators to NuGet.org
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  dotnet nuget push \
                    "./artifacts/Blazing.Mediator.SourceGenerators.${{ steps.version.outputs.version }}.nupkg" \
                    --api-key ${{ secrets.NUGET_API_KEY }} \
                    --source https://api.nuget.org/v3/index.json --skip-duplicate
            - name: Push Blazing.Mediator.SourceGenerators symbols to NuGet.org
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  dotnet nuget push \
                    "./artifacts/Blazing.Mediator.SourceGenerators.${{ steps.version.outputs.version }}.snupkg" \
                    --api-key ${{ secrets.NUGET_API_KEY }} \
                    --source https://api.nuget.org/v3/index.json --skip-duplicate
