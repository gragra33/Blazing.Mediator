name: CI

on:
    push:
        branches:
            - develop
            - "feature/**"
            - "fix/**"
    pull_request:
        branches:
            - develop
            - master

jobs:
    validate-branch:
        name: Validate Branch Name
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - name: Check branch naming convention
              env:
                  BRANCH: ${{ github.head_ref }}
              run: |
                  if [[ ! "$BRANCH" =~ ^(feature|fix)/.+ ]]; then
                    echo "::error::Branch '$BRANCH' does not follow naming conventions."
                    echo "::error::PR source branches must be prefixed with 'feature/' or 'fix/'."
                    exit 1
                  fi
                  echo "Branch '$BRANCH' follows naming conventions."

    build-and-test:
        name: Build & Test (${{ matrix.framework }})
        needs: validate-branch
        # Run on push events (validate-branch skipped) OR on valid PRs (validate-branch succeeded)
        if: always() && (needs.validate-branch.result == 'success' || needs.validate-branch.result == 'skipped')
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                framework: ["net9.0", "net10.0"]
        steps:
            - uses: actions/checkout@v5
            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: |
                      9.0.x
                      10.0.x
            - name: Restore
              run: dotnet restore Blazing.Mediator.CI.slnf
            - name: Build
              run: dotnet build Blazing.Mediator.CI.slnf --no-restore --configuration Release --framework ${{ matrix.framework }} -p:GeneratePackageOnBuild=false
            - name: Test — Blazing.Mediator.Tests (${{ matrix.framework }})
              run: |
                  dotnet test tests/Blazing.Mediator.Tests/Blazing.Mediator.Tests.csproj \
                    --configuration Release --framework ${{ matrix.framework }} \
                    --logger "trx;LogFileName=test-results-core-${{ matrix.framework }}.trx"
            - name: Test — ECommerce.Api.Tests (${{ matrix.framework }})
              run: |
                  dotnet test tests/ECommerce.Api.Tests/ECommerce.Api.Tests.csproj \
                    --configuration Release --framework ${{ matrix.framework }} \
                    --logger "trx;LogFileName=test-results-ecommerce-${{ matrix.framework }}.trx"
            - name: Test — UserManagement.Api.Tests (${{ matrix.framework }})
              run: |
                  dotnet test tests/UserManagement.Api.Tests/UserManagement.Api.Tests.csproj \
                    --configuration Release --framework ${{ matrix.framework }} \
                    --logger "trx;LogFileName=test-results-usermgmt-${{ matrix.framework }}.trx"
            - name: Test — Streaming.Api.Tests (${{ matrix.framework }})
              run: |
                  dotnet test tests/Streaming.Api.Tests/Streaming.Api.Tests.csproj \
                    --configuration Release --framework ${{ matrix.framework }} \
                    --logger "trx;LogFileName=test-results-streaming-${{ matrix.framework }}.trx"
            - name: Test — OpenTelemetryExample.Tests (${{ matrix.framework }})
              run: |
                  dotnet test tests/OpenTelemetryExample.Tests/OpenTelemetryExample.Tests.csproj \
                    --configuration Release --framework ${{ matrix.framework }} \
                    --logger "trx;LogFileName=test-results-otel-${{ matrix.framework }}.trx"
            - name: Upload test results
              uses: actions/upload-artifact@v5
              if: always()
              continue-on-error: true
              with:
                  name: test-results-${{ matrix.framework }}
                  path: "**/*.trx"
